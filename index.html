<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/sunbot.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agente IA Windmar Home</title>
    <script>
      // Aplica modo oscuro antes del render para evitar flash blanco
      try {
        const saved = localStorage.getItem('wh-theme');
        const dark = saved === null ? true : saved === 'dark';
        if (dark) document.documentElement.classList.add('dark');
      } catch {}
    </script>
  </head>
  <body style="background-color: #eef4fa;" class="dark:!bg-[#0a1628]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
