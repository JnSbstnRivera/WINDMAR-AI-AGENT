<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1B3A5C"/>
  <!-- Antenna -->
  <line x1="32" y1="8" x2="32" y2="16" stroke="#F7941D" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="7" r="3" fill="#F7941D"/>
  <!-- Robot head -->
  <rect x="14" y="16" width="36" height="26" rx="5" fill="#F7941D"/>
  <!-- Eyes -->
  <rect x="20" y="23" width="8" height="7" rx="2" fill="#1B3A5C"/>
  <rect x="36" y="23" width="8" height="7" rx="2" fill="#1B3A5C"/>
  <!-- Eye glow -->
  <rect x="21" y="24" width="3" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="37" y="24" width="3" height="3" rx="1" fill="white" opacity="0.8"/>
  <!-- Mouth -->
  <rect x="22" y="34" width="20" height="4" rx="2" fill="#1B3A5C"/>
  <rect x="24" y="34" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
  <rect x="30" y="34" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
  <rect x="36" y="34" width="4" height="4" rx="1" fill="white" opacity="0.4"/>
  <!-- Neck -->
  <rect x="28" y="42" width="8" height="4" fill="#F7941D"/>
  <!-- Body -->
  <rect x="18" y="46" width="28" height="12" rx="4" fill="#F7941D"/>
  <!-- Body detail -->
  <circle cx="32" cy="52" r="3" fill="#1B3A5C"/>
  <circle cx="32" cy="52" r="1.5" fill="#F7941D"/>
</svg>
